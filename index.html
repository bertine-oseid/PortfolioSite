<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Rivera — Portfolio</title>
  <meta name="description" content="Personlig portfolio, lenker og blogg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="site-header">
      <nav class="nav">
        <span class="nav-logo">AR</span>
        <div class="nav-links">
          <a href="#grid" class="nav-link active" data-page="grid">Hjem</a>
          <a href="#blog" class="nav-link" data-page="blog">Blogg</a>
        </div>

        <!-- Language toggle -->
        <div class="lang-toggle" id="langToggle" aria-label="Switch language">
          <button class="lang-opt active" data-lang="no">NO</button>
          <span class="lang-sep">|</span>
          <button class="lang-opt" data-lang="en">EN</button>
        </div>

        <a href="preview.html" class="preview-btn" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 20h8M12 18v2"/></svg>
          Preview
        </a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon">◑</span>
        </button>

        <!-- Persistent edit mode toggle — always visible in the nav -->
        <button class="nav-edit-toggle" id="navEditToggle" aria-label="Toggle edit mode">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span class="nav-edit-label">Edit</span>
          <span class="nav-edit-dot"></span>
        </button>
      </nav>
    </header>

    <!-- Grid Page -->
    <main id="page-grid" class="page active">
      <div class="portfolio-layout">

        <!-- Left: sticky profile sidebar -->
        <aside class="profile-sidebar" id="profileSidebar">
          <div class="sidebar-avatar" id="sidebarAvatar"></div>
          <div class="sidebar-text">
            <div class="sidebar-name"    id="sidebarName"></div>
            <div class="sidebar-tagline" id="sidebarTagline"></div>
          </div>
        </aside>

        <!-- Right: bento grid -->
        <div class="portfolio-content">
          <div class="bento-grid" id="bentoGrid"></div>
          <div class="admin-safe-spacer"></div>
        </div>

      </div>
    </main>

    <!-- Blog Page -->
    <main id="page-blog" class="page">
      <div class="blog-container">
        <div class="blog-header">
          <h1 class="blog-title">Skriving</h1>
          <p class="blog-subtitle">Tanker, essays og notater</p>
        </div>
        <div class="blog-list" id="blogList"></div>
      </div>
    </main>

    <!-- Blog Post Page -->
    <main id="page-post" class="page">
      <div class="post-container">
        <button class="back-btn" id="backBtn">← Tilbake til skriving</button>
        <article id="postContent"></article>
      </div>
    </main>

    <!-- Unified admin control bar — single fixed strip at bottom -->
    <div class="admin-control-bar" id="adminControlBar">

      <!-- Left slot: spacer keeps dock centred -->
      <div class="admin-bar-left"></div>

      <!-- Centre: creation dock (shown only in admin mode) -->
      <div class="creation-dock" id="creationDock">
        <span class="dock-label">Add block</span>
        <div class="dock-divider"></div>
        <button class="dock-btn" data-type="social" title="Social Link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span>Social</span>
        </button>
        <button class="dock-btn" data-type="link" title="Link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span>Link</span>
        </button>
        <button class="dock-btn" data-type="location" title="Location">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Location</span>
        </button>
        <button class="dock-btn" data-type="divider" title="Divider">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/></svg>
          <span>Divider</span>
        </button>
        <button class="dock-btn" data-type="text" title="Text Block">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Text</span>
        </button>
        <button class="dock-btn" data-type="video" title="Video">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <span>Video</span>
        </button>
        <div class="dock-divider"></div>
        <button class="dock-btn" data-type="profile-header" title="Profile Header">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Profile</span>
        </button>
        <button class="dock-btn" data-type="contact-card" title="Contact Card">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>Contact</span>
        </button>
      </div>

      <!-- Right slot: Edit / Done toggle (always visible) -->
      <div class="admin-bar-right">
        <button id="addBoxBtn" class="add-box-btn" aria-label="Add new box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Box
        </button>
        <button id="adminToggleBtn" class="admin-toggle-btn" aria-label="Toggle edit mode">
          <svg class="icon-edit" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <svg class="icon-done" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span class="toggle-label-edit">Edit</span>
          <span class="toggle-label-done">Done</span>
        </button>
      </div>

    </div>
  </div>

  <!-- Password modal -->
  <div class="modal-overlay" id="passwordModal" role="dialog" aria-modal="true" aria-labelledby="pwTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="pwTitle">Admin Access</h3>
      </div>
      <div class="modal-body">
        <p class="modal-desc">Enter your password to edit this portfolio.</p>
        <div class="form-group">
          <input type="password" id="pwInput" class="form-input" placeholder="Password"
                 autocomplete="current-password" />
        </div>
        <p class="form-error" id="pwError"></p>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" id="pwCancel">Cancel</button>
        <button class="modal-btn modal-btn-primary" id="pwSubmit">Unlock</button>
      </div>
    </div>
  </div>

  <!-- Add Box modal -->
  <div class="modal-overlay" id="addBoxModal" role="dialog" aria-modal="true" aria-labelledby="abTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="abTitle">Add New Box</h3>
        <button class="modal-close" id="addBoxClose" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="abType">Box Type</label>
          <select class="form-select" id="abType">
            <option value="social">🔗 Social Link</option>
            <option value="link">🌐 Link</option>
            <option value="text">📝 Plain Text</option>
            <option value="video">🎥 Video</option>
            <option value="location">📍 Location</option>
            <option value="divider">➖ Divider / Spacer</option>
            <option value="profile-header">👤 Profile Header</option>
            <option value="contact-card">✉️ Contact Card</option>
          </select>
        </div>
        <!-- Dynamic fields injected here by JS -->
        <div id="abDynamicFields"></div>
        <!-- Size selector -->
        <div class="form-group">
          <label class="form-label">Starting Size</label>
          <div class="size-btn-group" id="abSizeGroup">
            <button class="size-btn active" data-size="1x1">Small<span>1×1</span></button>
            <button class="size-btn" data-size="2x1">Wide<span>2×1</span></button>
            <button class="size-btn" data-size="1x2">Tall<span>1×2</span></button>
            <button class="size-btn" data-size="2x2">Big<span>2×2</span></button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" id="abCancel">Cancel</button>
        <button class="modal-btn modal-btn-primary" id="abSubmit">Add Box</button>
      </div>
    </div>
  </div>

  <!-- Data -->
  <script src="src/data/config.js"></script>
  <script src="src/data/blog-posts.js"></script>

  <!-- i18n must load before components so I18N is available -->
  <script src="src/components/i18n.js"></script>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Drag-and-drop -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <!-- Components -->
  <script src="src/components/grid.js"></script>
  <script src="src/components/blog.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
