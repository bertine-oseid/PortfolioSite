<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Preview — Bento Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0e;
      --surface: #1c1c1b;
      --border: rgba(255,255,255,0.1);
      --text: #fafaf9;
      --muted: #78716c;
      --accent: #f97316;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- TOOLBAR ---- */
    .toolbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .toolbar-left { display: flex; align-items: center; gap: 16px; }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 14px; height: 14px; }

    .divider { width: 1px; height: 20px; background: var(--border); }

    .toolbar-title { font-size: 14px; font-weight: 500; color: var(--muted); }

    /* Segmented control */
    .seg {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .seg-btn {
      background: none;
      border: none;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--muted);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .seg-btn.active { background: rgba(255,255,255,0.1); color: var(--text); }
    .seg-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }

    .seg-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .dim-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
    }

    .toolbar-right { display: flex; align-items: center; gap: 10px; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
    }
    .action-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .action-btn svg { width: 14px; height: 14px; }

    .open-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .open-btn:hover { opacity: 0.9; }
    .open-btn svg { width: 14px; height: 14px; }

    /* ---- STAGE ---- */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      overflow: auto;
      position: relative;
    }

    .frame-outer {
      position: relative;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1),
                  height 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    .frame-dims {
      position: absolute;
      top: -26px;
      left: 0;
      font-size: 12px;
      color: var(--muted);
    }

    /* Device shell */
    .device-shell {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #0f0f0e;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 24px 60px rgba(0,0,0,0.6);
    }

    /* Desktop chrome */
    .chrome-desktop {
      height: 36px;
      background: #1a1a19;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }
    .chrome-dots { display: flex; gap: 6px; }
    .chrome-dot { width: 10px; height: 10px; border-radius: 50%; }
    .chrome-dot.red   { background: #ff5f57; }
    .chrome-dot.amber { background: #febc2e; }
    .chrome-dot.green { background: #28c840; }
    .chrome-bar {
      flex: 1;
      height: 22px;
      background: rgba(255,255,255,0.06);
      border-radius: 5px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .chrome-url { font-size: 11px; color: rgba(255,255,255,0.3); }

    /* Mobile chrome */
    .chrome-mobile {
      height: 44px;
      background: #1a1a19;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .notch {
      width: 100px;
      height: 28px;
      background: #0f0f0e;
      border-radius: 0 0 18px 18px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }
    .status-time { font-size: 13px; font-weight: 600; color: var(--text); }
    .status-icons { display: flex; align-items: center; gap: 5px; color: var(--text); }
    .status-icons svg { width: 14px; height: 14px; }

    /* Iframe */
    iframe {
      width: 100%;
      flex: 1;
      border: none;
      display: block;
    }

    /* ---- STATUS BAR ---- */
    .status-bar {
      height: 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      flex-shrink: 0;
    }
    .status-item {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-item svg { width: 12px; height: 12px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #28c840; }
  </style>
</head>
<body>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <div class="divider"></div>
      <span class="toolbar-title">Site preview</span>
    </div>

    <div class="seg" id="seg">
      <button class="seg-btn active" onclick="setMode('desktop', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 20h8M12 18v2"/></svg>
        16:9
        <span class="dim-badge" id="badge-desktop">1280×720</span>
      </button>
      <button class="seg-btn" onclick="setMode('mobile', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="7" y="2" width="10" height="20" rx="3"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        9:16
        <span class="dim-badge" id="badge-mobile">390×844</span>
      </button>
    </div>

    <div class="toolbar-right">
      <button class="action-btn" onclick="reloadFrame()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Reload
      </button>
      <button class="open-btn" onclick="openInTab()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open live
      </button>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <div class="frame-outer" id="frameOuter" style="width: 720px; height: 405px;">
      <div class="frame-dims" id="frameDims">1280 × 720 — scaled to fit</div>
      <div class="device-shell" id="deviceShell">

        <!-- Desktop chrome (shown by default) -->
        <div class="chrome-desktop" id="chromeDesktop">
          <div class="chrome-dots">
            <div class="chrome-dot red"></div>
            <div class="chrome-dot amber"></div>
            <div class="chrome-dot green"></div>
          </div>
          <div class="chrome-bar">
            <span class="chrome-url" id="chromeUrl">localhost:3000</span>
          </div>
        </div>

        <!-- Mobile chrome (hidden by default) -->
        <div class="chrome-mobile" id="chromeMobile" style="display:none; position:relative;">
          <div class="notch"></div>
          <span class="status-time">9:41</span>
          <div class="status-icons">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2"/><line x1="23" y1="10" x2="23" y2="14"/></svg>
          </div>
        </div>

        <iframe id="previewFrame" src="index.html" title="Site preview"></iframe>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot"></div>
      Live preview
    </div>
    <div class="status-item" id="statusDims">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      1280 × 720
    </div>
    <div class="status-item" id="statusScale">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      56% scale
    </div>
  </div>

<script>
  const MODES = {
    desktop: {
      realW: 1280, realH: 720,
      frameAR: 720/1280,
      chrome: 'desktop',
      label: '1280 × 720',
      hint: '1280 × 720 — scaled to fit',
    },
    mobile: {
      realW: 390, realH: 844,
      frameAR: 844/390,
      chrome: 'mobile',
      label: '390 × 844',
      hint: '390 × 844 — scaled to fit',
    }
  };

  let currentMode = 'desktop';

  function computeSize(mode) {
    const m = MODES[mode];
    const stage = document.getElementById('stage');
    const pad = 64;
    const maxW = stage.clientWidth - pad;
    const maxH = stage.clientHeight - pad;

    let w, h;
    if (mode === 'desktop') {
      w = Math.min(maxW, 900);
      h = w * m.frameAR;
      if (h > maxH) { h = maxH; w = h / m.frameAR; }
    } else {
      h = Math.min(maxH, 620);
      w = h / m.frameAR;
      if (w > maxW * 0.5) { w = maxW * 0.5; h = w * m.frameAR; }
    }
    return { w: Math.round(w), h: Math.round(h) };
  }

  function setMode(mode, btn) {
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = mode;
    applyMode(mode);
  }

  function applyMode(mode) {
    const m = MODES[mode];
    const { w, h } = computeSize(mode);
    const scale = Math.round((w / m.realW) * 100);

    const outer = document.getElementById('frameOuter');
    outer.style.width = w + 'px';
    outer.style.height = h + 'px';

    document.getElementById('frameDims').textContent = m.hint;
    document.getElementById('statusDims').querySelector('svg').nextSibling.textContent = ' ' + m.label;
    document.getElementById('statusDims').lastChild.textContent = m.label;
    document.getElementById('statusScale').lastChild.textContent = scale + '% scale';

    const frame = document.getElementById('previewFrame');
    frame.style.transform = `scale(${w / m.realW})`;
    frame.style.transformOrigin = 'top left';
    frame.style.width = m.realW + 'px';
    frame.style.height = (h / (w / m.realW)) + 'px';

    document.getElementById('chromeDesktop').style.display = mode === 'desktop' ? 'flex' : 'none';
    document.getElementById('chromeMobile').style.display = mode === 'mobile' ? 'flex' : 'none';

    const url = window.location.href.replace('preview.html', 'index.html');
    document.getElementById('chromeUrl').textContent = url.replace(/^https?:\/\//, '');

    // Tell the iframe to switch its layout without a full reload
    try {
      const iwin = frame.contentWindow;
      if (iwin && iwin.applyLayout) {
        // Temporarily override innerWidth check inside the iframe
        const fakeWidth = mode === 'mobile' ? 390 : 1280;
        iwin.__previewWidth = fakeWidth;
        iwin.applyLayout(true);
      }
    } catch(e) { /* cross-origin or not ready yet */ }
  }

  function reloadFrame() {
    const f = document.getElementById('previewFrame');
    f.src = f.src;
  }

  function openInTab() {
    window.open('index.html', '_blank');
  }

  window.addEventListener('resize', () => applyMode(currentMode));
  window.addEventListener('load', () => applyMode('desktop'));
</script>
</body>
</html>
